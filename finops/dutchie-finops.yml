meters:
- name: plus_license
  description: Fixed per-retailer Dutchie Plus headless-commerce license fee.
  unit: contract
  aggregation: sum
  dimensions:
  - account
  - retailer
- name: platform_subscription
  description: Dutchie platform subscription (POS / Ecommerce) the Plus license is bundled with.
  unit: contract
  aggregation: sum
  dimensions:
  - account
  - location
- name: payments_volume
  description: >-
    Payments processed through Dutchie for orders completed via the checkout flow;
    priced as a take-rate/per-transaction fee where Dutchie Payments is used.
  unit: transactions
  aggregation: sum
  dimensions:
  - account
  - retailer
principles:
- name: Visibility
  description: Track the Dutchie Plus license and platform fees per retailer/location on the Dutchie invoice.
- name: Allocation
  description: Map per-retailer API keys and license lines to the dispensary/brand cost center they serve.
- name: Optimization
  description: >-
    Consolidate storefronts per retailer; monitor the Plus 2026 sunset and plan
    migration cost before end-of-life rather than under deprecation pressure.
- name: Accountability
  description: Assign an owner per retailer storefront to review Dutchie fees and payments take-rate against revenue.
