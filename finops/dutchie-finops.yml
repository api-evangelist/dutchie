description: >-
  FinOps view of Dutchie Plus spend. Dutchie Plus is not usage-metered per API
  call; it is an enterprise, contract-priced headless-commerce license
  provisioned per retailer as part of a Dutchie ecommerce/POS/payments agreement.
  Cost is therefore a fixed/committed subscription line item rather than
  consumption-based token/request billing, so FinOps focus is on license
  allocation per dispensary/location and on the payments take-rate, not on
  per-request optimization. Note - Dutchie has announced a 2026 sunset of the Plus
  headless commerce API, which is itself a cost/migration-planning consideration.
notes: >-
  No public consumption pricing exists for Dutchie Plus; meters below are modeled
  around the enterprise subscription and payments model. Verify contract terms and
  the Plus sunset/migration timeline with Dutchie during reconciliation.
sources:
- https://dutchie.com/plus
- https://plus.dutchie.com/plus/docs
