serviceCategory: Commerce and Retail
billingModel:
  pricingCategory: Committed
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Dutchie Plus
  ServiceCategory: Commerce and Retail
  ProviderName: Dutchie
