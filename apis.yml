aid: dutchie
url: https://raw.githubusercontent.com/api-evangelist/dutchie/refs/heads/main/apis.yml
name: Dutchie
kind: company
description: Dutchie is a cannabis retail technology platform providing point of sale,
  ecommerce, and payments for dispensaries. Its headless commerce product, Dutchie
  Plus, exposes a GraphQL API (endpoint https://plus.dutchie.com/plus/2021-07/graphql)
  that lets developers build fully custom, branded dispensary storefronts against
  Dutchie's ecommerce backend - querying retailer menus, products, variants, potency,
  and specials, and driving a stateful cart/checkout that respects cannabis
  compliance, inventory, taxes, and per-state rules. Requests are GraphQL POST
  operations authenticated with a per-retailer Bearer API key. Note - Dutchie has
  announced a 2026 sunset/deprecation of the Plus headless commerce API.
