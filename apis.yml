apis:
- aid: dutchie:dutchie-plus-retailers-api
  name: Dutchie Plus Retailers API
  tags:
  - Retailers
  - Dispensaries
  - Locations
  - GraphQL
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://plus.dutchie.com/plus/docs
  baseURL: https://plus.dutchie.com/plus/2021-07/graphql
  properties:
  - url: https://plus.dutchie.com/plus/docs
    type: Documentation
  - url: graphql/dutchie-graphql.md
    type: GraphQL
  - url: graphql/dutchie-schema.graphql
    type: GraphQL
  description: GraphQL queries for the dispensaries/retailers connected to your Dutchie
    Plus account - retailer metadata, address, hours, accepted order types
    (pickup/delivery), and pricing types (recreational/medical). Retailers are the
    scope every menu, specials, and checkout operation runs against. Modeled from
    the Dutchie Plus 2021-07 schema and documentation; the retailer scope is
    established by the per-retailer API key.
- aid: dutchie:dutchie-plus-menu-api
  name: Dutchie Plus Menu API
  tags:
  - Menu
  - Products
  - Variants
  - Inventory
  - GraphQL
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://plus.dutchie.com/plus/docs
  baseURL: https://plus.dutchie.com/plus/2021-07/graphql
  properties:
  - url: https://plus.dutchie.com/plus/docs
    type: Documentation
  - url: graphql/dutchie-graphql.md
    type: GraphQL
  - url: graphql/dutchie-schema.graphql
    type: GraphQL
  description: The core headless-storefront query. `menu(filter, pagination)` returns
    a retailer's live product catalog - each Product carries brand, category,
    strainType, description, image, CBD/THC potency, and priced variants (option,
    priceRec, priceMed, and special prices). Filter by Category and paginate with
    limit/offset. Confirmed against the official Dutchie Plus Next.js example.
- aid: dutchie:dutchie-plus-specials-api
  name: Dutchie Plus Specials API
  tags:
  - Specials
  - Deals
  - Promotions
  - Discounts
  - GraphQL
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://plus.dutchie.com/plus/docs
  baseURL: https://plus.dutchie.com/plus/2021-07/graphql
  properties:
  - url: https://plus.dutchie.com/plus/docs
    type: Documentation
  - url: graphql/dutchie-graphql.md
    type: GraphQL
  - url: graphql/dutchie-schema.graphql
    type: GraphQL
  description: GraphQL queries for a retailer's active specials, deals, and
    promotions - the discount programs surfaced on the menu that produce the
    special variant prices (specialPriceRec / specialPriceMed) returned by the Menu
    API. Modeled from the Dutchie Plus 2021-07 schema and documentation; the
    special pricing fields themselves are confirmed on the Product variant type.
- aid: dutchie:dutchie-plus-checkout-api
  name: Dutchie Plus Checkout API
  tags:
  - Checkout
  - Cart
  - Orders
  - Compliance
  - GraphQL
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://plus.dutchie.com/plus/docs
  baseURL: https://plus.dutchie.com/plus/2021-07/graphql
  properties:
  - url: https://plus.dutchie.com/plus/docs
    type: Documentation
  - url: graphql/dutchie-graphql.md
    type: GraphQL
  - url: graphql/dutchie-schema.graphql
    type: GraphQL
  description: The stateful cart and order lifecycle via GraphQL mutations -
    `createCheckout`, `addItem`, `updateQuantity`, `removeItem`, and
    `updateCheckout` (order type / pricing type), plus the `checkout(id)` query. A
    Checkout tracks its Items and returns a `redirectUrl` used to complete the
    compliant order. Confirmed against the official Dutchie Plus Next.js example.
